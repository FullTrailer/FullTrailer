<!DOCTYPE html>
<html>
<head>

<body>

      <g stroke="#181C1F" stroke-width="1"><line x1="206" y1="46" x2="564" y2="46"></line><line x1="206" y1="60" x2="564" y2="60"></line><line x1="206" y1="74" x2="564" y2="74"></line><line x1="206" y1="88" x2="564" y2="88"></line></g>
      <rect x="204" y="33" width="360" height="4" rx="2" fill="#F2A413"></rect>
      <g fill="#F2A413"><rect x="208" y="31" width="4" height="2.5" rx="1"></rect><rect x="220" y="31" width="4" height="2.5" rx="1"></rect><rect x="232" y="31" width="4" height="2.5" rx="1"></rect></g>

      <polygon points="67,46 108,46 108,62 67,62" fill="url(#glassS)"></polygon>

      <line x1="72" y1="66" x2="80" y2="66" stroke="#4A525A" stroke-width="1.6" stroke-linecap="round"></line>

      <rect x="13" y="110" width="22" height="6" rx="1.5" fill="#2A3036" stroke="#3E464D" stroke-width="1"></rect>

        <g id="wF">

          <circle r="17.5" fill="none" stroke="#20262A" stroke-width="1.5"></circle>
          <circle r="11" fill="url(#rimF)"></circle>

          <g fill="#0C0F11"><circle cx="0" cy="-6.6" r="1.35"></circle><circle cx="5.7" cy="-3.3" r="1.35"></circle><circle cx="5.7" cy="3.3" r="1.35"></circle><circle cx="0" cy="6.6" r="1.35"></circle><circle cx="-5.7" cy="3.3" r="1.35"></circle><circle cx="-5.7" cy="-3.3" r="1.35"></circle></g>
          <circle r="3.1" fill="#F2A413"></circle>
        </g>
      </defs>

      <ellipse cx="510" cy="146" rx="486" ry="5.5" fill="#000" opacity="0.45" filter="url(#shadF)"></ellipse>

      <rect x="112" y="103" width="120" height="6" fill="#15181B"></rect>
      <polygon points="176,103 212,103 205,93 183,93" fill="#3A4148"></polygon>
      <circle cx="194" cy="95" r="2.4" fill="#20262A"></circle>
      <rect x="109" y="27" width="5" height="84" rx="2" fill="url(#chromeF)"></rect>
      <rect x="107" y="25" width="9" height="5" rx="2" fill="#5A626A"></rect>

      <!-- trailer 1 -->
      <rect x="202" y="30" width="366" height="78" rx="4" fill="url(#bodyF)" stroke="#3E464D" stroke-width="1.5"></rect>
      <g stroke="#181C1F" stroke-width="1"><line x1="206" y1="46" x2="564" y2="46"></line><line x1="206" y1="60" x2="564" y2="60"></line><line x1="206" y1="74" x2="564" y2="74"></line><line x1="206" y1="88" x2="564" y2="88"></line></g>
      <rect x="204" y="33" width="360" height="4" rx="2" fill="#F2A413"></rect>
      <rect x="202" y="100" width="366" height="8" rx="2" fill="#141719"></rect>
      <line x1="556" y1="35" x2="556" y2="100" stroke="#3E464D" stroke-width="1.5"></line>
      <rect x="200" y="107" width="16" height="4" rx="1" fill="#20262A"></rect>

      <!-- dolly -->
      <rect x="565" y="112" width="46" height="5" rx="2" fill="#15181B"></rect>
      <rect x="600" y="100" width="102" height="7" rx="2" fill="#15181B"></rect>
      <polygon points="628,100 668,100 661,90 635,90" fill="#3A4148"></polygon>
      <circle cx="648" cy="92" r="2.2" fill="#20262A"></circle>

      <!-- trailer 2 -->
      <rect x="652" y="30" width="360" height="78" rx="4" fill="url(#bodyF)" stroke="#3E464D" stroke-width="1.5"></rect>
      <g stroke="#181C1F" stroke-width="1"><line x1="656" y1="46" x2="1008" y2="46"></line><line x1="656" y1="60" x2="1008" y2="60"></line><line x1="656" y1="74" x2="1008" y2="74"></line><line x1="656" y1="88" x2="1008" y2="88"></line></g>
      <rect x="654" y="33" width="354" height="4" rx="2" fill="#F2A413"></rect>
      <g fill="#F2A413"><rect x="658" y="31" width="4" height="2.5" rx="1"></rect><rect x="670" y="31" width="4" height="2.5" rx="1"></rect><rect x="682" y="31" width="4" height="2.5" rx="1"></rect></g>
      <rect x="652" y="100" width="360" height="8" rx="2" fill="#141719"></rect>
      <line x1="1000" y1="35" x2="1000" y2="100" stroke="#3E464D" stroke-width="1.5"></line>
      <g fill="#2A3036"><rect x="997" y="44" width="4" height="7" rx="1"></rect><rect x="997" y="82" width="4" height="7" rx="1"></rect></g>
      <rect x="992" y="108" width="3" height="13" fill="#20262A"></rect><rect x="1005" y="108" width="3" height="13" fill="#20262A"></rect><rect x="990" y="119" width="20" height="3" rx="1" fill="#20262A"></rect>

      <!-- cab -->
      <path d="M16,112 L16,74 C16,69 18,66 23,64 L33,59 L43,44 C45,41 48,40 52,40 L114,40 L114,112 Z" fill="url(#bodyF)" stroke="#3E464D" stroke-width="1.5"></path>
      <path d="M90,40 C90,31 96,25 106,25 L119,25 C121,25 122,27 122,29 L122,40 Z" fill="url(#bodyF)" stroke="#3E464D" stroke-width="1.2"></path>
      <polygon points="37,60 48,45 62,45 62,60" fill="url(#glassF)"></polygon>
      <polygon points="67,46 108,46 108,62 67,62" fill="url(#glassF)"></polygon>
      <line x1="86" y1="46" x2="86" y2="62" stroke="#3E464D" stroke-width="1"></line>
      <line x1="72" y1="66" x2="80" y2="66" stroke="#4A525A" stroke-width="1.6" stroke-linecap="round"></line>
      <rect x="16" y="98" width="98" height="4.5" fill="#F2A413"></rect>
      <rect x="17" y="73" width="13" height="24" rx="2" fill="#15181B"></rect>
      <g stroke="#3A4148" stroke-width="1"><line x1="19" y1="78" x2="28" y2="78"></line><line x1="19" y1="83" x2="28" y2="83"></line><line x1="19" y1="88" x2="28" y2="88"></line><line x1="19" y1="93" x2="28" y2="93"></line></g>
      <rect x="17" y="104" width="11" height="7" rx="2" fill="#C9CDD0"></rect>
      <rect x="13" y="110" width="22" height="6" rx="1.5" fill="#2A3036" stroke="#3E464D" stroke-width="1"></rect>
      <line x1="34" y1="52" x2="29" y2="45" stroke="#4A525A" stroke-width="1.6" stroke-linecap="round"></line>
      <rect x="24" y="40" width="4" height="9" rx="1.5" fill="#2A3036"></rect>
      <rect x="120" y="95" width="44" height="15" rx="7.5" fill="url(#chromeF)"></rect>

      <use href="#wF" x="214" y="124"></use>

      <use href="#wF" x="630" y="124"></use>
      <use href="#wF" x="668" y="124"></use>
      <use href="#wF" x="946" y="124"></use>
      <use href="#wF" x="984" y="124"></use>
    </svg>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:120},&quot;tipo&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sencillo&quot;,&quot;full&quot;],&quot;default&quot;:&quot;sencillo&quot;,&quot;tsType&quot;:&quot;'sencillo' | 'full'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tipo = this.props.tipo || 'sencillo';
    return { isSencillo: tipo !== 'full', isFull: tipo === 'full' };
  }
}
</script>
</body>
</html>
